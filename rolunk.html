            <div class="lista" id="mobil-menu">

                    <li><a href="index.html">Kezdőlap</a></li>

        <div class="hero-banner" >
            <div class="hero-szoveg">
                <h1>Órarend</h1>
                <p>Találd meg a kedvenc órádat!</p>
            </div>
        </div>

        <article class="content-modern">
            
            <div class="search-toolbar card">
                <div class="search-group">
                    <input type="text" id="kereso-mezo" placeholder="Keresés név vagy oktató alapján...">
                </div>
                <div class="search-group">
                    <select id="tipus-szuro-lista">
                        <option value="osszes">Minden típus</option>
                        <option value="tanc">Tánc</option>
                        <option value="Aerobik">Aerobik</option>
                        <option value="ero">Erősítő</option>
                        <option value="relax">Relax</option>
                    </select>
                </div>
                <div class="search-group">
                    <button id="kereses-gomb">Keresés</button>
                </div>
            </div>

            <p class="talalatok" id="talalatok-szama" style="text-align: center; margin-bottom: 10px; font-weight: bold;"></p>

            <div class="table-container card">
                <table id="teljes-orak-tabla" class="styled-table full-width">
                    <thead>
                        <tr>
                            <th>Óra neve</th>
                            <th>Oktató</th>
                            <th>Típus</th>
                            <th>Nap</th>
                            <th>Időpont</th>
                        </tr>
                    </thead>
                    <tbody id="teljes-orak-tabla-torzs"></tbody>
                </table>
